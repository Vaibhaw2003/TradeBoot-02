# Server
server.port=8000

# MongoDB Configuration
spring.data.mongodb.uri=mongodb://localhost:27017/tradeboot

# JWT Secret Properties
jwt.secret=9a4f2c8d3b7a1e6f45c8a0b3f267d8b1d4e6f3c8a9d2b5f8e3a9c8b5f6v8a3d9
jwt.expiration=86400000

# Logging
logging.level.com.tradeboot.api=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web=DEBUG

# Mail Configuration - Gmail SMTP
# IMPORTANT: You MUST use a Gmail "App Password", not your regular Gmail password.
# 1. Go to Google Account -> Security -> 2-Step Verification
# 2. Create an App Password and paste it below without spaces.
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-email@gmail.com
spring.mail.password=your-app-password

# Required properties for Gmail
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# Timeouts to prevent hanging
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# Enable debug logging for JavaMail to troubleshoot blocks
spring.mail.properties.mail.debug=true
